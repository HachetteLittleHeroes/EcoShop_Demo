<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #fdfaf7;
            --text: #3c3c3c;
            --accent: #8e9775;
            --accent-text: #ffffff;
            --secondary: #f2ede4;
            --gray: #a6a6a6;
            --card-bg: #ffffff;
            --fav: #e74c3c;
            --error: #e67e22; /* Цвет для индикации лимита */
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px;
            -webkit-tap-highlight-color: transparent;
        }

        .header { padding: 25px 20px 10px; font-size: 26px; font-weight: 700; }
        .page { display: none; padding: 0 15px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Фильтры */
        .filter-container { display: flex; gap: 10px; padding: 10px 0 20px; overflow-x: auto; white-space: nowrap; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .filter-container::-webkit-scrollbar { display: none; }
        .filter-btn { padding: 10px 20px; border-radius: 25px; border: 1px solid var(--secondary); background: var(--card-bg); font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .category-title { 
            margin: 25px 0 15px; font-size: 13px; color: var(--accent); 
            text-transform: uppercase; font-weight: 800; letter-spacing: 1px;
            border-bottom: 1px solid var(--secondary); padding-bottom: 5px;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--card-bg); border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.03); display: flex; flex-direction: column; position: relative; }

        .gallery-wrapper { position: relative; width: 100%; }
        .card-gallery { width: 100%; height: 160px; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; cursor: pointer; }
        .card-gallery::-webkit-scrollbar { display: none; }
        .card-gallery img { flex: 0 0 100%; width: 100%; height: 100%; object-fit: cover; scroll-snap-align: start; }
        
        .dots-container {
            position: absolute; bottom: 8px; width: 100%;
            display: flex; justify-content: center; gap: 4px;
            pointer-events: none; z-index: 5;
        }
        .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.4); transition: 0.3s; }
        .dot.active { background: #ffffff; transform: scale(1.2); }

        .wishlist-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.8); border: none; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; color: var(--gray); backdrop-filter: blur(4px); }
        .wishlist-btn.active { color: var(--fav); }

        .card-label { padding: 12px; flex-grow: 1; cursor: pointer; }
        .card-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
        .card-desc { font-size: 11px; color: var(--gray); margin-bottom: 8px; line-height: 1.3; }
        .card-price { font-weight: 700; color: var(--text); font-size: 16px; }

        .qty-control { display: flex; align-items: center; justify-content: space-between; background: var(--secondary); border-radius: 0 0 20px 20px; height: 45px; overflow: hidden; }
        .qty-ctrl-btn { flex: 1; height: 100%; border: none; background: none; font-size: 18px; font-weight: bold; color: var(--text); cursor: pointer; }
        .qty-num { flex: 1; text-align: center; font-weight: 800; font-size: 15px; color: var(--accent); }
        .qty-ctrl-btn:disabled { opacity: 0.3; }

        .buy-btn { background: var(--accent); color: var(--accent-text); border: none; padding: 12px; font-weight: 600; cursor: pointer; width: 100%; border-radius: 0 0 20px 20px; transition: 0.2s; height: 45px; }
        .buy-btn:disabled { background: var(--gray) !important; opacity: 0.6; }
        .buy-btn.added { background-color: #6d755a !important; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; backdrop-filter: blur(5px); justify-content: center; align-items: flex-end; }
        .modal.open { display: flex; animation: fadeIn 0.3s; }
        .modal-content { background: var(--bg); width: 100%; max-height: 90%; border-radius: 30px 30px 0 0; overflow-y: auto; position: relative; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .close-modal { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.7); border: none; width: 36px; height: 36px; border-radius: 50%; z-index: 2010; font-size: 20px; }
        
        .modal-gallery { width: 100%; height: 300px; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; position: relative; }
        .modal-gallery img { flex: 0 0 100%; width: 100%; height: 100%; object-fit: cover; scroll-snap-align: start; }
        
        .modal-info { padding: 25px; }
        .modal-desc { white-space: pre-line; font-size: 14px; line-height: 1.6; margin: 15px 0; opacity: 0.9; }

        .balance-card { 
            background: linear-gradient(135deg, #8e9775 0%, #6d755a 100%); 
            border-radius: 24px; padding: 40px 20px; color: white; text-align: center; margin-top: 10px; 
            box-shadow: 0 10px 20px rgba(142,151,117,0.2);
        }
        .balance-amount { font-size: 42px; font-weight: 700; margin: 10px 0; }
        
        .bonus-info-card { background: var(--card-bg); border-radius: 18px; padding: 15px; margin-bottom: 20px; }
        .bonus-rule { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 0.5px solid var(--secondary); }
        .rule-icon { color: var(--accent); font-size: 18px; width: 25px; text-align: center; }
        .rule-text { font-size: 14px; flex: 1; }
        .rule-value { font-weight: 700; color: var(--accent); font-size: 14px; }

        .hits-container { display: flex; overflow-x: auto; gap: 15px; padding: 10px 0 20px; scroll-snap-type: x mandatory; }
        .hit-card { min-width: 280px; scroll-snap-align: start; background: var(--card-bg); border-radius: 20px; display: flex; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; }
        .hit-card img { width: 120px; height: 120px; object-fit: cover; }
        
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(253, 250, 247, 0.95); backdrop-filter: blur(10px); display: flex; border-top: 0.5px solid var(--secondary); z-index: 999; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; border: none; background: none; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: var(--gray); position: relative; gap: 4px; transition: 0.2s; }
        .nav-icon { font-size: 22px; line-height: 1; }
        .nav-btn.active { color: var(--accent); transform: scale(1.05); }
        .badge { position: absolute; top: 6px; left: 58%; background: var(--accent); color: white; border-radius: 10px; padding: 2px 7px; font-size: 10px; font-weight: bold; border: 2px solid var(--bg); }

        .row-item { background: var(--card-bg); padding: 16px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .bonus-toggle-container { background: var(--card-bg); padding: 15px; border-radius: 18px; margin: 15px 0; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--secondary); }
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }
        input[type="text"] { width: 100%; padding: 14px; border-radius: 15px; border: 1px solid var(--secondary); margin-bottom: 15px; box-sizing: border-box; font-size: 16px; }
    </style>
</head>
<body>

    <div id="shop" class="page active">
        <div class="header">Эко-лавка ✨</div>
        <input type="text" id="itemSearch" placeholder="Поиск товаров..." oninput="renderShop()">
        
        <div class="filter-container">
            <button class="filter-btn active" onclick="filterCat('all', this)">Все</button>
            <button class="filter-btn" onclick="filterCat('candle', this)">Свечи</button>
            <button class="filter-btn" onclick="filterCat('body', this)">Уход</button>
        </div>

        <div id="hitsSection" style="display:none">
            <div class="category-title">Хиты сезона 🔥</div>
            <div id="hitsGrid" class="hits-container"></div>
        </div>
        
        <div id="section-candle" class="category-section">
            <div class="category-title">Свечи ручной работы</div>
            <div id="candlesGrid" class="grid"></div>
        </div>

        <div id="section-body" class="category-section">
            <div class="category-title">Уход и SPA</div>
            <div id="bodyGrid" class="grid"></div>
        </div>
    </div>

    <div id="wishlist" class="page">
        <div class="header">Избранное ♡</div>
        <div id="wishlistGrid" class="grid"></div>
        <div id="wishlistEmpty" style="text-align:center; padding:50px; color:var(--gray)">Тут пока пусто</div>
    </div>

    <div id="cart" class="page">
        <div class="header">Корзина</div>
        <div id="cartList"></div>
        <div id="bonusActionBlock" style="display:none">
            <div class="bonus-toggle-container">
                <div>
                    <div style="font-weight:600; font-size:14px;">Списать бонусы</div>
                    <div style="font-size:11px; color:var(--gray)">Доступно: <span id="availableBonuses">0</span> <i class="fas fa-leaf"></i></div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="useBonusesToggle" onchange="renderCart()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        <button id="orderBtn" class="buy-btn" style="border-radius: 18px; margin-top:10px; display: none; padding: 18px; height: auto;" onclick="checkout()">Оформить заказ</button>
    </div>

    <div id="profile" class="page">
        <div class="header">Мои бонусы</div>
        <div class="balance-card">
            <p style="margin:0; opacity:0.8; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;">Баланс красоты</p>
            <div class="balance-amount"><span id="userBalanceDisplay">0</span> <i class="fas fa-leaf"></i></div>
        </div>

        <div class="category-title">Как получить бонусы</div>
        <div class="bonus-info-card">
            <div class="bonus-rule"><i class="fas fa-comment-dots rule-icon"></i><div class="rule-text">За отзыв</div><div class="rule-value">+25 <i class="fas fa-leaf"></i></div></div>
            <div class="bonus-rule"><i class="fas fa-shopping-bag rule-icon"></i><div class="rule-text">За покупку от 1 500 ₽</div><div class="rule-value">+50 <i class="fas fa-leaf"></i></div></div>
            <div class="bonus-rule"><i class="fas fa-crown rule-icon"></i><div class="rule-text">За покупку от 3 000 ₽</div><div class="rule-value">+125 <i class="fas fa-leaf"></i></div></div>
            <div class="bonus-rule"><i class="fas fa-gem rule-icon"></i><div class="rule-text">За покупку от 5 000 ₽</div><div class="rule-value">+175 <i class="fas fa-leaf"></i></div></div>
        </div>

        <div class="category-title">Информация</div>
        <div class="row-item"><span>Ваш ID:</span><b id="userIdDisplay">---</b></div>
    </div>

    <div id="productModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-modal" onclick="closeModal()">×</button>
            <div id="modalGalleryContainer"></div>
            <div class="modal-info">
                <div id="modalName" style="font-size:22px; font-weight:700;"></div>
                <div id="modalPrice" style="font-size:18px; color:var(--accent); font-weight:700; margin-top:5px;"></div>
                <div id="modalDesc" class="modal-desc"></div>
                <button id="modalBuyBtn" class="buy-btn" style="border-radius:15px; padding:15px; height: auto;"></button>
            </div>
        </div>
    </div>

    <nav class="nav">
        <button id="btn-shop" class="nav-btn active" onclick="tab('shop')"><span class="nav-icon">🌿</span>Витрина</button>
        <button id="btn-wishlist" class="nav-btn" onclick="tab('wishlist')"><span class="nav-icon">♡</span>Избранное<span id="wishBadge" class="badge" style="display:none">0</span></button>
        <button id="btn-cart" class="nav-btn" onclick="tab('cart')"><span class="nav-icon">🛒</span>Корзина<span id="cartBadge" class="badge" style="display:none">0</span></button>
        <button id="btn-profile" class="nav-btn" onclick="tab('profile')"><span class="nav-icon">✨</span>Профиль</button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTFMqZ4dB7Nwn-KL2Lj21hO6iJIq59hsMX1XJjxS9n7fFXy_7anW9MV4lcWWHMZiESX-Z0f1yMle3cB/pub?output=csv';

        let products = [];
        let cart = [];
        let wishlist = JSON.parse(localStorage.getItem('ecoWishlist')) || [];
        let userBalance = 0;

        async function loadProducts() {
            try {
                const res = await fetch(SHEET_CSV_URL + '&t=' + Date.now());
                let text = await res.text();
                text = text.replace(/^\uFEFF/, ''); 
                
                const rows = [];
                let currentRow = [];
                let currentField = '';
                let inQuotes = false;

                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    const nextChar = text[i+1];
                    if (char === '"' && inQuotes && nextChar === '"') {
                        currentField += '"'; i++; 
                    } else if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        currentRow.push(currentField.trim());
                        currentField = '';
                    } else if ((char === '\r' || char === '\n') && !inQuotes) {
                        if (currentField || currentRow.length > 0) {
                            currentRow.push(currentField.trim());
                            rows.push(currentRow);
                            currentRow = [];
                            currentField = '';
                        }
                    } else {
                        currentField += char;
                    }
                }
                if (currentField || currentRow.length > 0) {
                    currentRow.push(currentField.trim());
                    rows.push(currentRow);
                }

                products = rows.slice(1).map(cols => {
                    let imgs = cols[7] ? cols[7].split(',').map(s => s.trim()) : ['https://via.placeholder.com/300'];
                    let description = (cols[5] || '')
                        .replace(/\\n/g, '\n')
                        .replace(/\/n/g, '\n');
                    
                    return {
                        id: cols[0], cat: cols[1], name: cols[2], price: parseInt(cols[3]) || 0,
                        shortDesc: cols[4], fullDesc: description, stock: parseInt(cols[6]) || 0,
                        imgList: imgs, isHit: (cols[8] || '').toLowerCase() === 'yes'
                    };
                }).filter(p => p.id);
                
                renderShop();
            } catch (e) { 
                console.error("Ошибка загрузки данных:", e); 
            }
        }

        function createGallery(imgs, productId) {
            const dots = imgs.length > 1 ? 
                `<div class="dots-container">${imgs.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}"></div>`).join('')}</div>` : '';
            
            return `
                <div class="gallery-wrapper">
                    <div class="card-gallery" onclick="openModal('${productId}')" onscroll="updateDots(this)">
                        ${imgs.map(url => `<img src="${url}">`).join('')}
                    </div>
                    ${dots}
                </div>`;
        }

        function updateDots(el) {
            const index = Math.round(el.scrollLeft / el.offsetWidth);
            const dots = el.parentElement.querySelectorAll('.dot');
            dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
        }

        function toggleWish(id, e) {
            if(e) e.stopPropagation();
            const idx = wishlist.indexOf(id);
            if(idx === -1) wishlist.push(id); else wishlist.splice(idx, 1);
            localStorage.setItem('ecoWishlist', JSON.stringify(wishlist));
            renderShop(); updateUI(); tg.HapticFeedback.selectionChanged();
        }

        function openModal(id) {
            const p = products.find(x => x.id == id);
            const dots = p.imgList.length > 1 ? 
                `<div class="dots-container">${p.imgList.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}"></div>`).join('')}</div>` : '';
            
            document.getElementById('modalGalleryContainer').innerHTML = `
                <div class="gallery-wrapper" style="height:300px">
                    <div class="modal-gallery" onscroll="updateDots(this)">
                        ${p.imgList.map(u => `<img src="${u}">`).join('')}
                    </div>
                    ${dots}
                </div>
            `;

            document.getElementById('modalName').innerText = p.name;
            document.getElementById('modalPrice').innerText = p.price + ' ₽';
            document.getElementById('modalDesc').innerText = p.fullDesc;
            
            const btn = document.getElementById('modalBuyBtn');
            const inCart = cart.find(c => c.id == id);
            const isFull = (inCart && inCart.qty >= p.stock) || p.stock < 1;
            
            btn.innerText = p.stock < 1 ? 'Ожидается' : (isFull ? 'Лимит наличия' : `В корзину - ${p.price} ₽`);
            btn.disabled = isFull;
            btn.onclick = () => { addToCart(id); openModal(id); };
            
            document.getElementById('productModal').classList.add('open');
            tg.HapticFeedback.impactOccurred('medium');
        }

        function closeModal() { document.getElementById('productModal').classList.remove('open'); }

        function filterCat(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.category-section').forEach(s => {
                s.style.display = (cat === 'all' || s.id === `section-${cat}`) ? 'block' : 'none';
            });
            document.getElementById('hitsSection').style.display = (cat === 'all') ? 'block' : 'none';
        }

        function renderShop() {
            const query = document.getElementById('itemSearch').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(query));
            
            const renderGrid = (id, cat) => {
                const items = filtered.filter(p => p.cat === cat);
                document.getElementById(id).innerHTML = items.map(p => {
                    const inCart = cart.find(c => c.id === p.id);
                    const isFav = wishlist.includes(p.id);
                    const isOutOfStock = p.stock < 1;

                    let actionBlock = '';
                    if (isOutOfStock) {
                        actionBlock = `<button class="buy-btn" disabled>Ожидается</button>`;
                    } else if (inCart) {
                        const isLimit = inCart.qty >= p.stock;
                        actionBlock = `
                            <div class="qty-control">
                                <button class="qty-ctrl-btn" onclick="updateItemQty('${p.id}', -1)">–</button>
                                <span class="qty-num" style="${isLimit ? 'color:var(--error); font-size:12px;' : ''}">${isLimit ? 'Лимит' : inCart.qty}</span>
                                <button class="qty-ctrl-btn" ${isLimit ? 'disabled' : ''} onclick="updateItemQty('${p.id}', 1)">+</button>
                            </div>`;
                    } else {
                        actionBlock = `<button id="btn-add-${p.id}" class="buy-btn" onclick="addToCart('${p.id}')">В корзину</button>`;
                    }

                    return `<div class="card">
                        <button class="wishlist-btn ${isFav?'active':''}" onclick="toggleWish('${p.id}', event)">${isFav?'❤':'♡'}</button>
                        ${createGallery(p.imgList, p.id)}
                        <div class="card-label" onclick="openModal('${p.id}')">
                            <div class="card-name">${p.name}</div>
                            <div class="card-desc">${p.shortDesc}</div>
                            <div class="card-price">${p.price} ₽ ${inCart ? `<span style="color:var(--accent); font-size:10px; margin-left:5px;">(${inCart.qty} шт)</span>` : ''}</div>
                        </div>
                        ${actionBlock}
                    </div>`;
                }).join('');
            };

            const hits = products.filter(p => p.isHit);
            document.getElementById('hitsSection').style.display = (hits.length && query === '') ? 'block' : 'none';
            document.getElementById('hitsGrid').innerHTML = hits.map(p => `
                <div class="hit-card" onclick="openModal('${p.id}')">
                    <img src="${p.imgList[0]}">
                    <div class="hit-info" style="padding:12px"><div class="card-name">${p.name}</div><div class="card-price">${p.price} ₽</div></div>
                </div>`).join('');

            renderGrid('candlesGrid', 'candle');
            renderGrid('bodyGrid', 'body');
        }

        function addToCart(id) {
            const p = products.find(x => x.id == id);
            const inCart = cart.find(x => x.id == id);
            if(inCart && inCart.qty >= p.stock) return;
            if(inCart) inCart.qty++; else cart.push({...p, qty: 1});
            
            const btn = document.getElementById(`btn-add-${id}`);
            if(btn) {
                btn.innerText = "Добавлено!";
                btn.classList.add('added');
                setTimeout(() => { renderShop(); }, 400);
            } else {
                renderShop();
            }
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
        }

        function updateItemQty(id, delta) {
            const itemIdx = cart.findIndex(x => x.id === id);
            const p = products.find(x => x.id === id);
            if (itemIdx !== -1) {
                if (delta > 0 && cart[itemIdx].qty >= p.stock) {
                    return;
                }
                cart[itemIdx].qty += delta;
                if (cart[itemIdx].qty <= 0) cart.splice(itemIdx, 1);
            }
            updateUI();
            renderShop();
            tg.HapticFeedback.selectionChanged();
        }

        function updateUI() {
            const cCount = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('cartBadge').innerText = cCount;
            document.getElementById('cartBadge').style.display = cCount > 0 ? 'block' : 'none';
            document.getElementById('wishBadge').innerText = wishlist.length;
            document.getElementById('wishBadge').style.display = wishlist.length > 0 ? 'block' : 'none';
        }

        function renderCart() {
            const list = document.getElementById('cartList');
            if(!cart.length) { 
                list.innerHTML = '<div style="text-align:center; padding:50px; color:var(--gray)">Корзина пуста</div>';
                document.getElementById('bonusActionBlock').style.display = 'none';
                document.getElementById('orderBtn').style.display = 'none';
                return; 
            }
            let total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('bonusActionBlock').style.display = userBalance > 0 ? 'block' : 'none';
            document.getElementById('availableBonuses').innerText = userBalance;
            
            let usedB = 0;
            if(document.getElementById('useBonusesToggle').checked) {
                usedB = Math.min(userBalance, total);
                total -= usedB;
            }

            list.innerHTML = cart.map((item, idx) => {
                const p = products.find(x => x.id == item.id);
                const isLimit = item.qty >= p.stock;
                return `
                <div class="row-item">
                    <div style="flex:1">
                        <b>${item.name}</b><br>
                        <small>${item.price * item.qty} ₽</small>
                    </div>
                    <div style="display:flex; flex-direction: column; align-items: flex-end; gap: 4px;">
                        <div style="display:flex; align-items:center; gap:10px">
                            <button onclick="changeQty(${idx}, -1)" style="border:none; width:32px; height:32px; border-radius:8px;">-</button>
                            <span style="${isLimit ? 'color:var(--error); font-weight:bold' : ''}">${item.qty}</span>
                            <button onclick="changeQty(${idx}, 1)" ${isLimit ? 'disabled' : ''} style="border:none; width:32px; height:32px; border-radius:8px;">+</button>
                        </div>
                        ${isLimit ? `<span style="color:var(--error); font-size:10px; font-weight:600;">лимит наличия</span>` : ''}
                    </div>
                </div>`}).join('') + `
                <div style="margin-top:20px; padding:20px; background:var(--secondary); border-radius:20px; text-align:right;">
                    ${usedB > 0 ? `<div style="color:var(--accent); font-weight:600;">Бонусы: -${usedB}</div>` : ''}
                    <div style="font-size:24px; font-weight:800;">${total} ₽</div>
                </div>`;
            document.getElementById('orderBtn').style.display = 'block';
        }

        function changeQty(idx, d) {
            const item = cart[idx];
            const p = products.find(x => x.id == item.id);
            if(d > 0 && item.qty >= p.stock) return;
            item.qty += d;
            if(item.qty <= 0) cart.splice(idx, 1);
            updateUI(); renderCart(); renderShop();
        }

        function renderWishlist() {
            const favs = products.filter(p => wishlist.includes(p.id));
            document.getElementById('wishlistEmpty').style.display = favs.length ? 'none' : 'block';
            document.getElementById('wishlistGrid').innerHTML = favs.map(p => {
                const inCart = cart.find(c => c.id === p.id);
                const isLimit = inCart && inCart.qty >= p.stock;
                return `<div class="card">
                    <button class="wishlist-btn active" onclick="toggleWish('${p.id}', event); renderWishlist();">❤</button>
                    <div style="height:160px" onclick="openModal('${p.id}')">
                        <img src="${p.imgList[0]}" style="width:100%; height:100%; object-fit:cover;">
                    </div>
                    <div class="card-label" onclick="openModal('${p.id}')"><b>${p.name}</b><br>${p.price} ₽</div>
                    <button class="buy-btn" ${isLimit ? 'disabled' : ''} onclick="addToCart('${p.id}')">
                        ${isLimit ? 'Лимит' : (inCart ? 'Добавить еще' : 'В корзину')}
                    </button>
                </div>`
            }).join('');
        }

        function checkout() {
            let total = 0; let txt = "";
            cart.forEach(i => { txt += `▪️ ${i.name} x${i.qty}\n`; total += i.price * i.qty; });
            let ub = 0;
            if(document.getElementById('useBonusesToggle').checked) {
                ub = Math.min(userBalance, total);
                total -= ub;
            }
            let details = `🌿 **ЗАКАЗ**\n${txt}${ub?`✨ Бонусы: ${ub}\n`:''}💰 **ИТОГО: ${total} ₽**`;
            tg.sendData(JSON.stringify({ details: details, bonus_used: ub, final_sum: total }));
            tg.close();
        }

        function tab(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
            if(id === 'cart') renderCart();
            if(id === 'wishlist') renderWishlist();
            if(id === 'shop') renderShop();
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            userBalance = parseInt(params.get('balance')) || 0;
            document.getElementById('userBalanceDisplay').innerText = userBalance;
            document.getElementById('userIdDisplay').innerText = params.get('id') || "---";
            loadProducts(); updateUI();
        }
    </script>
</body>
</html>
