<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #fdfaf7;
            --text: #3c3c3c;
            --accent: #8e9775;
            --accent-text: #ffffff;
            --secondary: #f2ede4;
            --gray: #a6a6a6;
            --card-bg: #ffffff;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding-bottom: 100px;
            -webkit-tap-highlight-color: transparent;
        }

        .header { padding: 25px 20px 10px; font-size: 26px; font-weight: 700; }
        .page { display: none; padding: 0 15px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .category-title { 
            margin: 25px 0 15px; font-size: 13px; color: var(--accent); 
            text-transform: uppercase; font-weight: 800; letter-spacing: 1px;
            border-bottom: 1px solid var(--secondary); padding-bottom: 5px;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .card { 
            background: var(--card-bg); border-radius: 20px; overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); display: flex; flex-direction: column; 
        }

        .card img { width: 100%; height: 160px; object-fit: cover; background: #eee; }
        .card-label { padding: 12px; flex-grow: 1; }
        .card-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
        .card-desc { font-size: 11px; color: var(--gray); margin-bottom: 8px; line-height: 1.3; }
        .card-price { font-weight: 700; color: var(--text); font-size: 16px; }

        .buy-btn { 
            background: var(--accent); color: var(--accent-text); border: none; 
            padding: 12px; font-weight: 600; cursor: pointer; width: 100%; 
            border-radius: 0 0 20px 20px; transition: 0.2s;
        }
        
        .buy-btn:disabled { 
            background: var(--gray) !important; 
            opacity: 0.6; 
            cursor: not-allowed; 
        }

        .hits-container {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 10px 0 20px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .hits-container::-webkit-scrollbar { display: none; }
        .hit-card {
            min-width: 280px;
            scroll-snap-align: start;
            background: var(--card-bg);
            border-radius: 20px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .hit-card img { width: 120px; height: 120px; object-fit: cover; }
        .hit-info { padding: 15px; display: flex; flex-direction: column; justify-content: center; flex: 1; }

        .nav { 
            position: fixed; bottom: 0; width: 100%; height: 70px; 
            background: rgba(253, 250, 247, 0.95); backdrop-filter: blur(10px);
            display: flex; border-top: 0.5px solid var(--secondary); z-index: 999; 
        }
        .nav-btn { flex: 1; border: none; background: none; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: var(--gray); }
        .nav-btn.active { color: var(--accent); }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }
        
        .badge { position: absolute; top: 8px; left: 55%; background: var(--accent); color: white; border-radius: 10px; padding: 2px 6px; font-size: 10px; }

        .balance-card {
            background: linear-gradient(135deg, #8e9775 0%, #6d755a 100%);
            border-radius: 24px; padding: 30px 20px; color: white; text-align: center;
            margin-top: 10px;
        }
        .balance-amount { font-size: 42px; font-weight: 700; margin: 5px 0; }

        .row-item { 
            background: var(--card-bg); padding: 16px; border-radius: 18px; 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 10px;
        }

        input { 
            width: 100%; padding: 14px; border-radius: 15px; border: 1px solid var(--secondary); 
            background: var(--card-bg); margin-bottom: 15px; outline: none; box-sizing: border-box;
        }
        
        .qty-btn:disabled { opacity: 0.3; }
    </style>
</head>
<body>

    <div id="shop" class="page active">
        <div class="header">Эко-лавка ✨</div>
        <input type="text" id="itemSearch" placeholder="Поиск товаров..." oninput="renderShop()">
        
        <div id="hitsSection" style="display:none">
            <div class="category-title">Хиты сезона 🔥</div>
            <div id="hitsGrid" class="hits-container"></div>
        </div>
        
        <div class="category-title">Свечи ручной работы</div>
        <div id="candlesGrid" class="grid"></div>

        <div class="category-title">Уход и SPA</div>
        <div id="bodyGrid" class="grid"></div>
    </div>

    <div id="cart" class="page">
        <div class="header">Корзина</div>
        <div id="cartList"></div>
        <button id="orderBtn" class="buy-btn" style="border-radius: 18px; margin-top:20px; display: none; padding: 18px;" onclick="checkout()">Оформить заказ</button>
    </div>

    <div id="profile" class="page">
        <div class="header">Мои бонусы</div>
        <div class="balance-card">
            <p style="margin:0; opacity:0.8; font-size: 11px; text-transform: uppercase;">Баланс красоты</p>
            <div class="balance-amount"><span id="userBalance">0</span> <i class="fas fa-leaf"></i></div>
        </div>
        <div class="category-title">Информация</div>
        <div class="row-item"><span>Ваш ID:</span><b id="userIdDisplay">---</b></div>
    </div>

    <nav class="nav">
        <button id="btn-shop" class="nav-btn active" onclick="tab('shop')"><span class="nav-icon">🌿</span>Витрина</button>
        <button id="btn-cart" class="nav-btn" onclick="tab('cart')">
            <span class="nav-icon">🛒</span>Корзина
            <span id="cartBadge" class="badge" style="display:none">0</span>
        </button>
        <button id="btn-profile" class="nav-btn" onclick="tab('profile')"><span class="nav-icon">✨</span>Профиль</button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTFMqZ4dB7Nwn-KL2Lj21hO6iJIq59hsMX1XJjxS9n7fFXy_7anW9MV4lcWWHMZiESX-Z0f1yMle3cB/pub?output=csv';

        let products = [];
        let cart = [];

        async function loadProducts() {
            try {
                const res = await fetch(SHEET_CSV_URL + '&t=' + Date.now());
                let text = await res.text();
                text = text.replace(/^\uFEFF/, ''); 

                const rows = text.split('\n').filter(row => row.trim() !== '');
                const dataRows = rows.slice(1); 
                
                products = dataRows.map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                    return {
                        id: cols[0],
                        cat: cols[1],
                        name: cols[2],
                        price: parseInt(cols[3]) || 0,
                        desc: cols[4],
                        stock: parseInt(cols[5]) || 0,
                        img: cols[6] || '',
                        isHit: (cols[7] || '').toLowerCase() === 'yes' // Читаем 8-ю колонку
                    };
                }).filter(p => p.id);

                renderShop();
            } catch (e) {
                console.error("Ошибка загрузки:", e);
            }
        }

        function renderShop() {
            const query = document.getElementById('itemSearch').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(query));
            
            // Хиты: теперь фильтруем по колонке Hit (yes)
            const hitsGrid = document.getElementById('hitsGrid');
            const hits = products.filter(p => p.isHit); 
            
            if (hits.length > 0) {
                document.getElementById('hitsSection').style.display = 'block';
                hitsGrid.innerHTML = hits.map(p => {
                    const inCart = cart.find(c => c.id === p.id);
                    const isFull = inCart && inCart.qty >= p.stock;
                    return `
                        <div class="hit-card" onclick="${isFull ? '' : `addToCart('${p.id}')`}" style="${isFull ? 'opacity:0.7' : ''}">
                            <img src="${p.img || 'https://via.placeholder.com/300'}">
                            <div class="hit-info">
                                <div class="card-name">${p.name}</div>
                                <div class="card-price">${p.price} ₽</div>
                                <div style="font-size:10px; color:var(--accent)">${isFull ? 'Лимит в корзине' : 'Нажмите, чтобы добавить'}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                document.getElementById('hitsSection').style.display = 'none';
            }

            const renderGrid = (targetId, cat) => {
                const grid = document.getElementById(targetId);
                const items = filtered.filter(p => p.cat === cat);
                
                grid.innerHTML = items.map(p => {
                    const inCart = cart.find(c => c.id === p.id);
                    const isLimitReached = (inCart && inCart.qty >= p.stock) || p.stock < 1;
                    
                    return `
                        <div class="card">
                            <img src="${p.img || 'https://via.placeholder.com/300?text=Eco+Product'}">
                            <div class="card-label">
                                <div class="card-name">${p.name}</div>
                                <div class="card-desc">${p.desc}</div>
                                <div class="card-price">${p.price} ₽</div>
                            </div>
                            <button class="buy-btn" 
                                ${isLimitReached ? 'disabled' : ''} 
                                onclick="addToCart('${p.id}')">
                                ${p.stock < 1 ? 'Ожидается' : (isLimitReached ? 'Достигнут лимит' : 'В корзину')}
                            </button>
                        </div>
                    `;
                }).join('');
            };

            renderGrid('candlesGrid', 'candle');
            renderGrid('bodyGrid', 'body');
        }

        function addToCart(id) {
            const product = products.find(p => p.id == id);
            const inCart = cart.find(item => item.id == id);
            const currentQty = inCart ? inCart.qty : 0;

            if (currentQty >= product.stock) {
                tg.showAlert(`Извините, в наличии всего ${product.stock} шт.`);
                return;
            }

            if (inCart) inCart.qty++;
            else cart.push({ ...product, qty: 1 });
            
            updateUI();
            renderShop();
            tg.HapticFeedback.impactOccurred('light');
        }

        function updateUI() {
            const total = cart.reduce((sum, i) => sum + i.qty, 0);
            const badge = document.getElementById('cartBadge');
            badge.innerText = total;
            badge.style.display = total > 0 ? 'block' : 'none';
        }

        function renderCart() {
            const list = document.getElementById('cartList');
            if (cart.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding:50px; color:var(--gray)">Корзина пуста</div>';
                document.getElementById('orderBtn').style.display = 'none';
                return;
            }
            
            const totalSum = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
            document.getElementById('orderBtn').style.display = 'block';

            list.innerHTML = cart.map((item, idx) => {
                const product = products.find(p => p.id == item.id);
                const isMax = item.qty >= product.stock;
                
                return `
                <div class="row-item">
                    <div style="flex:1">
                        <div style="font-weight:600">${item.name}</div>
                        <div style="font-size:12px; color:var(--accent)">${item.price * item.qty} ₽</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px">
                        <button class="qty-btn" onclick="changeQty(${idx}, -1)" style="border:none; background:var(--secondary); width:28px; height:28px; border-radius:8px;">-</button>
                        <span style="font-weight:bold; min-width:20px; text-align:center">${item.qty}</span>
                        <button class="qty-btn" 
                            ${isMax ? 'disabled' : ''} 
                            onclick="changeQty(${idx}, 1)" 
                            style="border:none; background:var(--secondary); width:28px; height:28px; border-radius:8px;">+</button>
                    </div>
                </div>
            `}).join('') + `
                <div style="margin-top:20px; padding:20px; background:var(--secondary); border-radius:20px; text-align:right;">
                    <div style="font-size:12px; opacity:0.6">К оплате:</div>
                    <div style="font-size:24px; font-weight:800; color:var(--accent);">${totalSum} ₽</div>
                </div>
            `;
        }

        function changeQty(idx, delta) {
            const item = cart[idx];
            const product = products.find(p => p.id == item.id);
            
            if (delta > 0 && item.qty >= product.stock) {
                tg.showAlert(`Больше нет в наличии (максимум: ${product.stock} шт.)`);
                return;
            }
            
            item.qty += delta;
            if (item.qty <= 0) cart.splice(idx, 1);
            
            updateUI();
            renderCart();
            renderShop();
        }

        function checkout() {
            let details = `🌿 **НОВЫЙ ЗАКАЗ**\n\n`;
            let total = 0;
            cart.forEach(item => {
                details += `▪️ ${item.name} x${item.qty} — ${item.price * item.qty} ₽\n`;
                total += item.price * item.qty;
            });
            details += `\n💰 **ИТОГО: ${total} ₽**`;
            
            tg.sendData(JSON.stringify({ details: details }));
            tg.close();
        }

        function tab(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
            if (id === 'cart') renderCart();
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            document.getElementById('userBalance').innerText = params.get('balance') || 0;
            document.getElementById('userIdDisplay').innerText = params.get('id') || "---";
            loadProducts();
        }
    </script>
</body>
</html>
